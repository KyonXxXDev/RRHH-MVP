<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HRMS — Sistema de Recursos Humanos</title>
  <meta name="description" content="Sistema de Gestión de Recursos Humanos - Panel Administrativo"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
</head>
<body>
  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Mobile Sidebar Overlay -->
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏢</div>
      <div class="brand-text">
        <div class="brand-name">HRMS</div>
        <div class="brand-tagline">Recursos Humanos</div>
      </div>
    </div>

    <div class="sidebar-toggle" id="sidebarToggle" title="Colapsar menú">›</div>

    <div class="sidebar-user">
      <div class="sidebar-user-avatar" id="sidebarAvatar">--</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebarUserName">Cargando...</div>
        <span class="sidebar-user-role" id="sidebarUserRole">--</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <button class="nav-item active" data-route="dashboard" id="nav-dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>

      <div class="nav-section-label">Colaboradores</div>
      <button class="nav-item" data-route="employees" id="nav-employees">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Colaboradores</span>
      </button>
      <button class="nav-item" data-route="legajo" id="nav-legajo">
        <span class="nav-icon">📁</span>
        <span class="nav-label">Legajo Digital</span>
      </button>

      <div class="nav-section-label">Asistencia</div>
      <button class="nav-item" data-route="attendance" id="nav-attendance">
        <span class="nav-icon">🕐</span>
        <span class="nav-label">Asistencia</span>
      </button>
      <button class="nav-item" data-route="tardiness" id="nav-tardiness">
        <span class="nav-icon">⚠️</span>
        <span class="nav-label">Tardanzas y Faltas</span>
      </button>

      <div class="nav-section-label">Solicitudes</div>
      <button class="nav-item" data-route="permissions" id="nav-permissions">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Permisos</span>
        <span class="nav-badge" id="permBadge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-route="vacations" id="nav-vacations">
        <span class="nav-icon">🌴</span>
        <span class="nav-label">Vacaciones</span>
      </button>
      <button class="nav-item" data-route="licenses" id="nav-licenses">
        <span class="nav-icon">🏥</span>
        <span class="nav-label">Licencias</span>
      </button>

      <div class="nav-section-label">Reportes</div>
      <button class="nav-item" data-route="reports" id="nav-reports">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Reportes</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-logout" id="logoutBtn">
        <span>🚪</span>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Topbar -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      <div>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-breadcrumb">
          <span>HRMS</span>
          <span>›</span>
          <span id="topbarBreadcrumb">Inicio</span>
        </div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-date" id="topbarDate">--</div>
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbarAvatar">--</div>
        <span class="topbar-user-name" id="topbarUserName">--</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <span>Cargando...</span>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/employees.js"></script>
  <script src="js/modules/attendance.js"></script>
  <script src="js/modules/tardiness.js"></script>
  <script src="js/modules/permissions.js"></script>
  <script src="js/modules/vacations.js"></script>
  <script src="js/modules/licenses.js"></script>
  <script src="js/modules/legajo.js"></script>
  <script src="js/modules/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
