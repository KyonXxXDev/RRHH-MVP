<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HRMS — Iniciar Sesión</title>
  <meta name="description" content="Sistema de Gestión de Recursos Humanos — Portal de acceso"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #0A2D63;
      --primary-light: #1E4FAD;
      --primary-dark: #071F47;
      --accent: #1E90FF;
      --accent-light: #3BA3FF;
      --success: #2DC653;
      --warning: #F59E0B;
      --danger: #E63946;
      --white: #FFFFFF;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-400: #94A3B8;
      --gray-600: #475569;
      --gray-800: #1E293B;
      --shadow-lg: 0 20px 60px rgba(10,45,99,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0A2D63 0%, #071F47 40%, #0D1B2A 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(30,144,255,0.15) 0%, transparent 70%);
      top: -200px; right: -100px;
      border-radius: 50%;
      animation: pulse 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(30,144,255,0.10) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      border-radius: 50%;
      animation: pulse 10s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .login-wrapper {
      display: flex;
      width: 100%;
      max-width: 1000px;
      min-height: 580px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
      z-index: 1;
      margin: 20px;
    }

    .login-brand {
      background: linear-gradient(160deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px;
      text-align: center;
    }

    .brand-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 36px;
      box-shadow: 0 12px 32px rgba(30,144,255,0.4);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .brand-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .brand-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      line-height: 1.6;
      max-width: 260px;
    }

    .brand-features {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 280px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }

    .feature-icon {
      width: 32px; height: 32px;
      background: rgba(30,144,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .login-form-container {
      background: var(--white);
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 48px;
    }

    .form-header { margin-bottom: 36px; }
    .form-header h2 {
      font-size: 26px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 6px;
    }
    .form-header p { font-size: 14px; color: var(--gray-600); }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--gray-400);
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: all 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(30,144,255,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(10,45,99,0.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading span { display: none; }
    .btn-login.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .demo-accounts {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
    }

    .demo-accounts h4 {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .demo-btn {
      padding: 8px 10px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .demo-btn:hover {
      background: rgba(30,144,255,0.06);
      border-color: var(--accent);
      color: var(--accent);
    }

    .demo-btn .role-tag {
      display: block;
      font-weight: 600;
      font-size: 12px;
      color: var(--primary);
      margin-bottom: 2px;
    }

    @media (max-width: 768px) {
      .login-brand { display: none; }
      .login-form-container { width: 100%; padding: 36px 28px; }
      .login-wrapper { max-width: 440px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-logo">🏢</div>
      <h1 class="brand-title">HRMS</h1>
      <p class="brand-subtitle">Sistema integral de Gestión de Recursos Humanos corporativo</p>
      <div class="brand-features">
        <div class="feature-item">
          <div class="feature-icon">👥</div>
          <span>Gestión completa de colaboradores</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <span>Dashboard con KPIs en tiempo real</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📅</div>
          <span>Control de asistencia y permisos</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📋</div>
          <span>Reportes y estadísticas ejecutivas</span>
        </div>
      </div>
    </div>

    <div class="login-form-container">
      <div class="form-header">
        <h2>Bienvenido 👋</h2>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="email" name="email" placeholder="usuario@empresa.com" autocomplete="username" required/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span>Iniciar Sesión</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="demo-accounts">
        <h4>Accesos Demo</h4>
        <div class="demo-grid">
          <button class="demo-btn" onclick="fillDemo('admin@empresa.com','Admin123!')">
            <span class="role-tag">🔑 Administrador</span>
            admin@empresa.com
          </button>
          <button class="demo-btn" onclick="fillDemo('rrhh@empresa.com','RRHH123!')">
            <span class="role-tag">👩‍💼 RRHH</span>
            rrhh@empresa.com
          </button>
          <button class="demo-btn" onclick="fillDemo('jefe@empresa.com','Jefe123!')">
            <span class="role-tag">👨‍💻 Jefe</span>
            jefe@empresa.com
          </button>
          <button class="demo-btn" onclick="fillDemo('colaborador@empresa.com','Colab123!')">
            <span class="role-tag">🧑‍🤝‍🧑 Colaborador</span>
            colaborador@empresa.com
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (() => {
      const { protocol, hostname, port } = window.location;
      if (protocol === 'file:') {
        return 'http://localhost:3001';
      }
      if (hostname === 'localhost' || hostname === '127.0.0.1') {
        return `${protocol}//${hostname}${port ? `:${port}` : ''}`;
      }
      return '';
    })();

    // Redirect if already logged in
    if (localStorage.getItem('hrms_token')) {
      window.location.href = '/app.html';
    }

    function fillDemo(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      document.getElementById('email').focus();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorMsg.style.display = 'none';
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Error al iniciar sesión';
          errorMsg.style.display = 'block';
          return;
        }

        localStorage.setItem('hrms_token', data.token);
        localStorage.setItem('hrms_user', JSON.stringify(data.user));
        window.location.href = '/app.html';
      } catch (err) {
        errorMsg.textContent = 'No se pudo conectar con el servidor. Verifica que el backend esté corriendo.';
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
